<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dashboard Mobile | Associados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

    <header class="main-header">
        <div class="user-info">
            <span>Olá, Bem-vindo</span>
            <h1 id="userName">Dashboard Geral</h1>
        </div>
        <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="dashboard-container">
        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon-box blue"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <span class="label">Total Associados</span>
                    <h2 id="kpiTotal">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-box green"><i class="fas fa-store"></i></div>
                <div class="stat-info">
                    <span class="label">Matrizes</span>
                    <h2 id="kpiMatriz">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-box red"><i class="fas fa-map-marker-alt"></i></div>
                <div class="stat-info">
                    <span class="label">Municípios</span>
                    <h2 id="kpiCidades">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-box purple"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <span class="label">Possuem PEC</span>
                    <h2 id="kpiPec">0</h2>
                </div>
            </div>
        </section>

        <section class="recent-activity">
            <div class="section-header">
                <h3>Últimas Alterações</h3>
                <i class="fas fa-history"></i>
            </div>
            <div id="activityList" class="activity-list">
                <p class="loading-text">Carregando histórico...</p>
            </div>
        </section>
    </main>

    <script src="js/mobile.js"></script>
</body>
</html>
