<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login | Finance Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
 * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at 20% 30%, #085098a1, transparent 45%),
              radial-gradient(circle at 90% 70%, #084F98, transparent 35%),
              #0b1220;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Grade de fundo mais sutil */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image: 
    linear-gradient(rgba(42, 53, 84, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(42, 53, 84, 0.05) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

/* Container levemente menor */
.login-container {
  width: 100%;
  max-width: 400px; /* Reduzido de 460px */
  position: relative;
  z-index: 2;
  animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

/* --- EFEITO DE BORDA ANIMADA --- */
.login-card {
  position: relative;
  background: rgba(20, 29, 47, 0.98);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 30px 35px; /* Reduzido */
  overflow: hidden; /* Garante que o brilho não vaze errado */
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

/* O brilho que gira ao fundo */
.login-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    transparent, 
    transparent, 
    transparent, 
    #F21E26
  );
  animation: rotate 4s linear infinite;
  z-index: -1;
}

/* Camada interna para criar a borda fina */
.login-card::after {
  content: '';
  position: absolute;
  inset: 2px; /* Espessura da borda */
  background: #141d2f;
  border-radius: 22px;
  z-index: -1;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Cabeçalho */
.login-header {
  text-align: center;
  margin-bottom: 28px; /* Reduzido */
}

.logo-badge {
  display: inline-flex;
  margin-bottom: 15px;
}

.login-header h1 {
  font-size: 24px; /* Reduzido de 32px */
  font-weight: 700;
  margin-bottom: 6px;
  color: #ffffff;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #98a6c7;
  font-size: 13px;
  font-weight: 400;
}

/* Formulário */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 18px; /* Mais compacto */
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-group label {
  font-size: 11px;
  font-weight: 700;
  color: #6b7aa1;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.input-wrapper {
  position: relative;
  transition: transform 0.2s ease;
}

.input-wrapper i:first-child {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #4a5578;
  font-size: 14px;
  z-index: 1;
}

.input-wrapper input {
  width: 100%;
  background: rgba(13, 21, 38, 0.6);
  border: 1px solid #2a3554;
  border-radius: 12px;
  padding: 12px 14px 12px 42px; /* Inputs menores */
  font-size: 14px;
  color: #e5edf9;
  transition: all 0.2s ease;
  outline: none;
}

.input-wrapper input:focus {
  border-color: #F21E26;
  background: #0d1526;
  box-shadow: 0 0 0 4px rgba(242, 30, 38, 0.1);
}

/* Opções e Links */
.login-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #98a6c7;
  cursor: pointer;
}

.checkbox-label input {
  width: 15px;
  height: 15px;
  accent-color: #F21E26;
}

/* Botão Principal */
.login-btn {
  background: #084F98;
  border: none;
  padding: 12px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 5px;
}

.login-btn:hover {
  background: #085098de;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px #08509860;
}

.login-btn:active {
  transform: translateY(0);
}

/* Toast */
.message-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e2a4a;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  color: #e5edf9;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 1000;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(255,255,255,0.1);
}

.message-toast.show {
  transform: translateX(-50%) translateY(0);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsividade */
@media (max-width: 480px) {
  .login-card {
    padding: 25px 20px;
  }
  .login-container {
    max-width: 100%;
  }
}
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-badge">
        <img src="assets/logo vida branco vertical.png" alt="" style="width: 160px;">
        <span class="logo-text"></span>
      </div>
      <h1> <strong>Bem-vindo </strong> de volta </h1>
      <p class="login-subtitle"  style="color: #F21E26;">Acesse sua conta para continuar</p>
    </div>

    <form class="login-form" id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i>Usuário</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" autocomplete="off" placeholder="Digite seu usuário">
        </div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Senha</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="Digite sua senha">
      
        </div>
      </div>

      <div class="login-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberCheckbox"> Lembrar-me
        </label>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-arrow-right-to-bracket"></i>
        Entrar
      </button>
    </form>

  
  </div>
</div>

<div id="toastMsg" class="message-toast">
  <i class="fas fa-circle-check" style="margin-right: 8px; color: #22c55e;"></i>
  Login realizado com sucesso!
</div>

<script>
  const FIREBASE_URL = "https://certificado-7974e-default-rtdb.firebaseio.com";

  (function() {
    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    if (toggleBtn && passwordInput) {
      toggleBtn.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        const icon = toggleBtn.querySelector('i');
        if (icon) {
          icon.classList.toggle('fa-eye');
          icon.classList.toggle('fa-eye-slash');
        }
      });
    }

    // Toast management
    const toast = document.getElementById('toastMsg');
    
    function showToast(message, isError = false) {
      if (!toast) return;
      
      if (window.toastTimeout) clearTimeout(window.toastTimeout);
      
      const iconSpan = toast.querySelector('i');
      if (isError) {
        iconSpan.className = 'fas fa-circle-exclamation';
        iconSpan.style.color = '#ef4444';
        toast.style.borderLeftColor = '#ef4444';
        toast.innerHTML = `<i class="fas fa-circle-exclamation" style="margin-right: 8px; color: #ef4444;"></i> ${message}`;
      } else {
        iconSpan.className = 'fas fa-circle-check';
        iconSpan.style.color = '#22c55e';
        toast.style.borderLeftColor = '#4f8cff';
        toast.innerHTML = `<i class="fas fa-circle-check" style="margin-right: 8px; color: #22c55e;"></i> ${message}`;
      }
      
      toast.classList.add('show');
      
      window.toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Função para buscar usuários do Firebase
    async function fetchUsers() {
      try {
        const response = await fetch(`${FIREBASE_URL}/usuarios.json`);
        if (!response.ok) throw new Error("Erro ao buscar usuários");
        const data = await response.json();
        return data || [];
      } catch (error) {
        console.error("Erro ao carregar usuários:", error);
        return [];
      }
    }

    // Função para validar login
    async function validateLogin(username, password) {
      const users = await fetchUsers();
      
      // Busca o usuário pelo username
      const user = users.find(u => 
        u.username && u.username.toLowerCase() === username.toLowerCase()
      );
      
      if (user && user.password === password) {
        return {
          success: true,
          user: {
            name: user.name,
            username: user.username
          }
        };
      }
      
      return {
        success: false,
        message: "Usuário ou senha incorretos"
      };
    }

    // Carregar credenciais salvas
    function loadSavedCredentials() {
      const savedUser = localStorage.getItem('savedUser');
      if (savedUser) {
        try {
          const user = JSON.parse(savedUser);
          document.getElementById('username').value = user.username;
          document.getElementById('password').value = user.password;
          document.getElementById('rememberCheckbox').checked = true;
        } catch (e) {
          console.error("Erro ao carregar credenciais salvas:", e);
        }
      }
    }

    // Salvar credenciais se "Lembrar-me" estiver marcado
    function saveCredentials(username, password, remember) {
      if (remember) {
        localStorage.setItem('savedUser', JSON.stringify({ username, password }));
      } else {
        localStorage.removeItem('savedUser');
      }
    }

    // Form handler com validação real
    const form = document.getElementById('loginForm');
    if (form) {
      // Carregar credenciais salvas ao iniciar
      loadSavedCredentials();
      
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username')?.value.trim() || '';
        const password = document.getElementById('password')?.value.trim() || '';
        const remember = document.getElementById('rememberCheckbox')?.checked || false;
        
        if (!username || !password) {
          showToast('❌ Preencha usuário e senha para continuar', true);
          return;
        }
        
        // Simular loading no botão
        const btn = form.querySelector('.login-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Autenticando...';
        btn.disabled = true;
        
        try {
          // Validar login com Firebase
          const result = await validateLogin(username, password);
          
          if (result.success) {
            showToast(`✅ Bem-vindo, ${result.user.name}! Redirecionando...`);
            
            // Salvar credenciais se solicitado
            saveCredentials(username, password, remember);
            
            // Salvar usuário logado no localStorage
            localStorage.setItem('user', JSON.stringify(result.user));
            
            setTimeout(() => {
              const overlay = document.createElement('div');
              overlay.style.position = 'fixed';
              overlay.style.top = '0';
              overlay.style.left = '0';
              overlay.style.width = '100%';
              overlay.style.height = '100%';
              overlay.style.backgroundColor = '#0b1220';
              overlay.style.zIndex = '9999';
              overlay.style.opacity = '0';
              overlay.style.transition = 'opacity 0.4s ease';
              overlay.style.pointerEvents = 'none';
              document.body.appendChild(overlay);
              
              setTimeout(() => { overlay.style.opacity = '1'; }, 10);
              
              setTimeout(() => {
                window.location.href = 'index.html';
              }, 500);
            }, 1500);
          } else {
            showToast(`🔒 ${result.message}`, true);
            
            // Shake effect no card
            const card = document.querySelector('.login-card');
            if (card) {
              card.style.transform = 'translateX(0)';
              card.style.animation = 'shake 0.4s ease-in-out';
              setTimeout(() => { card.style.animation = ''; }, 400);
            }
          }
        } catch (error) {
          console.error("Erro durante login:", error);
          showToast('❌ Erro ao conectar ao servidor. Tente novamente.', true);
        } finally {
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      });
    }
    
    // Adiciona keyframe shake
    if (!document.querySelector('#shakeKeyframe')) {
      const styleSheet = document.createElement('style');
      styleSheet.id = 'shakeKeyframe';
      styleSheet.textContent = `
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-6px); }
          75% { transform: translateX(6px); }
        }
      `;
      document.head.appendChild(styleSheet);
    }
    
    // Efeito visual nos campos
    const inputs = document.querySelectorAll('.input-wrapper input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        const wrapper = input.closest('.input-wrapper');
        if (wrapper) wrapper.style.transform = 'scale(1.01)';
      });
      input.addEventListener('blur', () => {
        const wrapper = input.closest('.input-wrapper');
        if (wrapper) wrapper.style.transform = 'scale(1)';
      });
    });
    
    console.log('Tela de login com validação Firebase integrada!');
  })();
</script>
</body>
</html>
